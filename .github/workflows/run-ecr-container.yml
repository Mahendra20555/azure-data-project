name: Run CompaniesHouse ECR container

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region for ECR and S3 access'
        required: true
        default: 'eu-north-1'
      ecr_image:
        description: 'ECR image URL to run (default uses latest tag)'
        required: true
        default: '207448370045.dkr.ecr.eu-north-1.amazonaws.com/companieshouse:latest'
      command:
        description: 'Command to run inside the container'
        required: true
        default: 'python scripts/bronze_to_silver.py'
      bronze_s3_bucket:
        description: 'S3 bucket name where bronze data is stored'
        required: true
        default: 'companieshouse-uk'
      bronze_s3_prefix:
        description: 'S3 prefix for bronze data files'
        required: false
        default: 'bronze/'
      delta_s3_bucket:
        description: 'S3 bucket name for Delta silver data'
        required: true
        default: 'companieshouse-uk'
      delta_s3_prefix:
        description: 'S3 prefix for Delta silver data'
        required: false
        default: 'silver/'

jobs:
  run-container:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ github.event.inputs.aws_region || 'eu-north-1' }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Authenticate to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull ECR image
        run: |
          docker pull ${{ github.event.inputs.ecr_image }}

      - name: Run container command
        env:
          AWS_REGION: ${{ github.event.inputs.aws_region }}
          BRONZE_S3_BUCKET: ${{ github.event.inputs.bronze_s3_bucket }}
          BRONZE_S3_PREFIX: ${{ github.event.inputs.bronze_s3_prefix }}
          DELTA_S3_BUCKET: ${{ github.event.inputs.delta_s3_bucket }}
          DELTA_S3_PREFIX: ${{ github.event.inputs.delta_s3_prefix }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ecr_image="${{ github.event.inputs.ecr_image }}"
          command="${{ github.event.inputs.command }}"
          if [ -z "$ecr_image" ]; then
            echo "ECR image input is empty. Please provide a valid ECR image URL."
            exit 1
          fi
          if [ -z "$command" ]; then
            echo "Command input is empty. Defaulting to 'python scripts/bronze_to_silver.py'."
            command='python scripts/bronze_to_silver.py'
          fi
          echo "Running container image: $ecr_image"
          echo "Using command: $command"
          docker run --rm \
            -e AWS_REGION \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e BRONZE_S3_BUCKET \
            -e BRONZE_S3_PREFIX \
            -e DELTA_S3_BUCKET \
            -e DELTA_S3_PREFIX \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$ecr_image" \
            sh -lc "$command"
