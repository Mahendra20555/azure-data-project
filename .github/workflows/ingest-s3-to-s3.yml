name: Ingest AWS S3 data into AWS bronze location

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region for the destination S3 bucket'
        required: true
        default: 'eu-north-1'
      download_url:
        description: 'URL to download the Companies House ZIP data from'
        required: true
        default: 'https://download.companieshouse.gov.uk/en_output.html'
      output_format:
        description: 'Upload data as CSV or parquet'
        required: true
        default: 'csv'
      destination_s3_bucket:
        description: 'Destination S3 bucket name for bronze data'
        required: true
        default: 'companieshouse-uk'
      destination_s3_prefix:
        description: 'Destination S3 prefix for bronze data'
        required: false
        default: 'bronze/'

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 requests pandas pyarrow

      - name: Run URL ingestion script
        env:
          DOWNLOAD_URL: ${{ github.event.inputs.download_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          DESTINATION_S3_BUCKET: ${{ github.event.inputs.destination_s3_bucket }}
          DESTINATION_S3_PREFIX: ${{ github.event.inputs.destination_s3_prefix }}
          AWS_REGION: ${{ github.event.inputs.aws_region }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/ingest_url_to_s3.py
