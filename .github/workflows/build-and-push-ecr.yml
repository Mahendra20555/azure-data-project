name: Build and push CompaniesHouse ECR image

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region for ECR and S3 access'
        required: true
        default: 'eu-north-1'
      ecr_repository:
        description: 'ECR repository URI without tag'
        required: true
        default: '207448370045.dkr.ecr.eu-north-1.amazonaws.com/companieshouse'
      image_tag:
        description: 'ECR image tag to push'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ github.event.inputs.aws_region }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ github.event.inputs.ecr_repository }}:${{ github.event.inputs.image_tag }} .

      - name: Push image to ECR
        run: |
          docker push ${{ github.event.inputs.ecr_repository }}:${{ github.event.inputs.image_tag }}
