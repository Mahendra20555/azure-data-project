name: Build and push CompaniesHouse ECR image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region for ECR and S3 access'
        required: true
        default: 'eu-north-1'
      ecr_repository:
        description: 'ECR repository URI without tag'
        required: true
        default: '207448370045.dkr.ecr.eu-north-1.amazonaws.com/companieshouse'
      image_tag:
        description: 'ECR image tag to push'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      # Fallback repository and image tag so push/pull_request events without inputs work
      ECR_REPOSITORY: ${{ github.event.inputs.ecr_repository || '207448370045.dkr.ecr.eu-north-1.amazonaws.com/companieshouse' }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ github.event.inputs.aws_region || 'eu-north-1' }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          echo "Building image: $ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" .

      - name: Push image to ECR (only on push to main)
        if: github.event_name == 'push'
        run: |
          echo "Pushing image: $ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
      - name: Skip push for PRs
        if: github.event_name != 'push'
        run: |
          echo "Not a push event ("${{ github.event_name }}"). Skipping push to ECR."
