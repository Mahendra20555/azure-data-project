name: Convert AWS S3 bronze CSV data to Delta Lake

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region for the S3 buckets'
        required: true
        default: 'eu-north-1'
      bronze_s3_bucket:
        description: 'S3 bucket name where bronze CSV data is stored'
        required: true
        default: 'companieshouse-uk'
      bronze_s3_prefix:
        description: 'S3 prefix for bronze CSV data'
        required: false
        default: 'bronze/'
      delta_s3_bucket:
        description: 'S3 bucket name where Delta table should be written'
        required: true
        default: 'companieshouse-uk'
      delta_s3_prefix:
        description: 'S3 prefix for Delta table storage'
        required: false
        default: 'silver/'

jobs:
  transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pandas pyarrow deltalake

      - name: Run bronze-to-delta conversion
        env:
          AWS_REGION: ${{ github.event.inputs.aws_region }}
          BRONZE_S3_BUCKET: ${{ github.event.inputs.bronze_s3_bucket }}
          BRONZE_S3_PREFIX: ${{ github.event.inputs.bronze_s3_prefix }}
          DELTA_S3_BUCKET: ${{ github.event.inputs.delta_s3_bucket }}
          DELTA_S3_PREFIX: ${{ github.event.inputs.delta_s3_prefix }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/bronze_to_delta.py
